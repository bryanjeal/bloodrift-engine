name: CI

on:
  push:
    branches:
      - main
      - "milestone/**"
  pull_request:
    branches:
      - main

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Zig
        uses: mlugg/setup-zig@v1
        with:
          version: "0.15.2"

      - name: Cache Zig build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/zig
            .zig-cache
          key: zig-${{ runner.os }}-${{ hashFiles('build.zig.zon') }}-${{ github.sha }}
          restore-keys: |
            zig-${{ runner.os }}-${{ hashFiles('build.zig.zon') }}-
            zig-${{ runner.os }}-

      - name: Run tests
        run: zig build test
